version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: polbook-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: polbook_db
      MYSQL_USER: polbook_user
      MYSQL_PASSWORD: polbook_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
