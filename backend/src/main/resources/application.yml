server:
  port: 8080
spring:
  datasource:
    # MySQL config (commented out for verification)
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # url: jdbc:mysql://localhost:3306/polbook_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # username: polbook_user
    # password: polbook_password
    url: jdbc:h2:mem:devdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # Changed to create-drop for fresh H2
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

  # 메일 설정 (Mock 모드에서는 실제로 사용되지 않지만, 빈 등록을 위해 기본값 설정)
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Polbook 커스텀 설정
polbook:
  mail:
    domain: office.kopo.ac.kr
    mock: true
    expiry-minutes: 5

jwt:
  secret: aW52YWxpZHNlY3JldGtleWZvcmRldmVsb3BtZW50b25seTEyMzQ1Njc4kwZTEyMzQ1Njc4!@#$ # 테스트용 시크릿
  access-token-validity-in-seconds: 1800 # 30분
  refresh-token-validity-in-seconds: 1209600 # 14일
