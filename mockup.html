<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polbook UI Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 모바일 뷰어 프레임 */
        body { background-color: #f3f4f6; display: flex; justify-content: center; padding: 20px; font-family: 'Pretendard', sans-serif; }
        .mobile-frame { width: 375px; height: 812px; background-color: white; border-radius: 40px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); overflow: hidden; position: relative; border: 8px solid #1f2937; margin: 0 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- 1. 로그인 화면 -->
    <div class="mobile-frame flex flex-col items-center justify-center px-6 relative">
        <div class="absolute top-0 w-full h-12 bg-white flex justify-between items-center px-6 text-sm font-semibold">
            <span>9:41</span>
            <div class="flex space-x-2">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="w-24 h-24 bg-blue-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
            <i class="fa-solid fa-book-open text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Polbook</h1>
        <p class="text-gray-500 mb-10 text-sm">교내 전공/교양 서적 중고 거래</p>

        <div class="w-full space-y-4">
            <input type="text" placeholder="학번" class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" placeholder="비밀번호" class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition mt-2">로그인</button>
        </div>

        <div class="flex items-center justify-center space-x-4 mt-8 text-sm text-gray-500">
            <a href="#" class="hover:text-blue-600">비밀번호 찾기</a>
            <span class="text-gray-300">|</span>
            <a href="#" class="hover:text-blue-600 font-semibold">회원가입</a>
        </div>
        <p class="text-xs text-gray-400 mt-auto mb-8 absolute bottom-0">kopo.ac.kr 이메일 인증 필수</p>
    </div>

    <!-- 2. 메인 홈 화면 -->
    <div class="mobile-frame flex flex-col bg-gray-50 relative">
        <!-- Top Bar -->
        <div class="bg-white px-5 py-4 flex justify-between items-center shadow-sm z-10 sticky top-0">
            <h1 class="text-xl font-bold text-blue-600"><i class="fa-solid fa-book-open mr-2"></i>Polbook</h1>
            <div class="flex space-x-4 text-gray-600 text-xl">
                <i class="fa-solid fa-magnifying-glass cursor-pointer"></i>
                <div class="relative cursor-pointer">
                    <i class="fa-regular fa-bell"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-3.5 h-3.5 rounded-full flex items-center justify-center border-2 border-white">2</span>
                </div>
            </div>
        </div>

        <!-- Categories -->
        <div class="bg-white pb-3 pt-2">
            <div class="flex overflow-x-auto hide-scrollbar space-x-2 px-5 pb-1">
                <button class="px-4 py-1.5 bg-gray-800 text-white text-sm font-medium rounded-full whitespace-nowrap">전체</button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap border border-gray-200">전공 서적</button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap border border-gray-200">교양 서적</button>
                <button class="px-4 py-1.5 bg-gray-100 text-gray-600 text-sm font-medium rounded-full whitespace-nowrap border border-gray-200">자격증</button>
            </div>
            <div class="px-5 mt-2 flex justify-between items-center text-xs text-gray-500">
                <span class="flex items-center"><i class="fa-solid fa-arrow-down-short-wide mr-1"></i> 최신순</span>
                <span class="flex items-center"><input type="checkbox" class="mr-1 accent-blue-600" checked> 판매중만 보기</span>
            </div>
        </div>

        <!-- Book List (Scrollable) -->
        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4 pb-24">
            <!-- Item 1 -->
            <div class="bg-white p-3 rounded-2xl shadow-sm flex space-x-3 active:scale-95 transition-transform cursor-pointer">
                <div class="w-24 h-24 bg-gray-200 rounded-xl overflow-hidden flex-shrink-0 relative">
                    <img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&q=80&w=200&h=200" class="w-full h-full object-cover">
                    <!-- 거래상태 뱃지 -->
                    <div class="absolute top-0 left-0 w-full h-full bg-black/40 flex items-center justify-center">
                        <span class="text-white font-bold text-sm bg-gray-800 px-2 py-1 rounded">거래완료</span>
                    </div>
                </div>
                <div class="flex flex-col flex-1 justify-between py-1">
                    <div>
                        <h3 class="font-bold text-gray-800 text-[15px] leading-tight mb-1 text-gray-400">데이터베이스 시스템 7판</h3>
                        <p class="text-xs text-gray-400">학생회관 앞 • 2시간 전</p>
                    </div>
                    <div class="flex justify-between items-end mt-2">
                        <span class="font-bold text-lg text-gray-400">25,000원</span>
                        <div class="flex space-x-2 text-xs text-gray-400">
                            <span class="flex items-center"><i class="fa-regular fa-heart mr-1"></i>4</span>
                            <span class="flex items-center"><i class="fa-regular fa-comment mr-1"></i>2</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="bg-white p-3 rounded-2xl shadow-sm flex space-x-3 active:scale-95 transition-transform cursor-pointer border border-transparent hover:border-blue-100">
                <div class="w-24 h-24 bg-gray-200 rounded-xl overflow-hidden flex-shrink-0">
                    <div class="w-full h-full bg-blue-50 flex items-center justify-center"><i class="fa-solid fa-book text-3xl text-blue-200"></i></div>
                </div>
                <div class="flex flex-col flex-1 justify-between py-1">
                    <div>
                        <h3 class="font-bold text-gray-800 text-[15px] leading-tight mb-1">C언어로 배우는 자료구조</h3>
                        <p class="text-xs text-gray-500">본관 1층 로비 • 방금 전</p>
                    </div>
                    <div class="flex justify-between items-end mt-2">
                        <span class="font-bold text-lg text-gray-900">18,000원</span>
                        <div class="flex space-x-2 text-xs text-gray-400">
                            <span class="flex items-center"><i class="fa-regular fa-heart mr-1"></i>1</span>
                        </div>
                    </div>
                </div>
            </div>
             <!-- Item 3 -->
            <div class="bg-white p-3 rounded-2xl shadow-sm flex space-x-3 active:scale-95 transition-transform cursor-pointer border border-transparent">
                <div class="w-24 h-24 bg-gray-200 rounded-xl overflow-hidden flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&q=80&w=200&h=200" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col flex-1 justify-between py-1">
                    <div>
                        <h3 class="font-bold text-gray-800 text-[15px] leading-tight mb-1">토익 RC/LC 세트 (필기 X)</h3>
                        <p class="text-xs text-gray-500">3기술관 입구 • 5시간 전</p>
                    </div>
                    <div class="flex justify-between items-end mt-2">
                        <span class="font-bold text-lg text-gray-900">30,000원</span>
                        <div class="flex space-x-2 text-xs text-gray-400">
                            <span class="flex items-center"><i class="fa-regular fa-heart mr-1"></i>8</span>
                            <span class="flex items-center"><i class="fa-regular fa-comment mr-1"></i>3</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FAB (Floating Action Button) -->
        <button class="absolute bottom-20 right-5 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-600/30 transition-transform active:scale-90 z-20">
            <i class="fa-solid fa-plus text-2xl"></i>
        </button>

        <!-- Bottom Navigation -->
        <div class="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center py-3 pb-6 z-30">
            <button class="flex flex-col items-center text-blue-600 space-y-1">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-[10px] font-bold">홈</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-600 space-y-1">
                <i class="fa-regular fa-comment-dots text-xl"></i>
                <span class="text-[10px] font-medium">채팅</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-600 space-y-1">
                <i class="fa-regular fa-heart text-xl"></i>
                <span class="text-[10px] font-medium">찜목록</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-gray-600 space-y-1">
                <i class="fa-regular fa-user text-xl"></i>
                <span class="text-[10px] font-medium">나의 폴북</span>
            </button>
        </div>
    </div>

</body>
</html>
